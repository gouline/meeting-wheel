name: MeetingWheel
options:
  bundleIdPrefix: net.gouline
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
targets:
  MeetingWheel:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.xcodeproj/**"
          - ".venv/**"
          - ".git/**"
          - "AppIcon.png"
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: MeetingWheel.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: net.gouline.MeetingWheel
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: "Meeting Wheel"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Meeting Wheel needs calendar access to display your upcoming meetings and their participants."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Meeting Wheel needs calendar access to display your upcoming meetings and their participants."
